# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-go/master/schema/compose-spec.json
services:
  prometheus-postgres:
    image: postgres:16-alpine
    container_name: prometheus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_database:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 256M
    ports:
      - "5432:5432"

  prometheus-redis:
    image: redis:8-alpine
    container_name: prometheus-redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis_database:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 256M
    ports:
      - "6379:6379"

  prometheus-application:
    profiles: ["application"]
    container_name: prometheus_application
    restart: unless-stopped
    environment:
      MIX_ENV: ${PHX_SERVER:-prod}
      PHX_SERVER: ${PHX_SERVER:-true}
      PHX_PORT: ${PHX_PORT:-4000}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      POSTGRES_HOST: prometheus-postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_POOL_SIZE: ${POSTGRES_POOL_SIZE:-8}
      REDIS_HOST: prometheus-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_POOL_SIZE: ${REDIS_POOL_SIZE:-8}
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      prometheus-postgres:
        condition: service_healthy
      prometheus-redis:
        condition: service_healthy
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 256M
    ports:
      - "${PHX_PORT:-4000}:${PHX_PORT:-4000}"

volumes:
  postgres_database:
    name: postgres_database
  redis_database:
    name: redis_database

networks:
  internal:
    driver: bridge

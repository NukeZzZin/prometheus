# * === Connections / Authentication * === #
bind 0.0.0.0
port 6379
protected-mode yes
tcp-backlog 511
timeout 0
tcp-keepalive 300
maxclients 5000

# * === Resources / Memory * === #
maxmemory 1GB
maxmemory-policy allkeys-lru

# * === Persistence * === #
save 900 1
save 300 10
save 60 10000

appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite yes

auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# * === Threads * === #
io-threads 2
io-threads-do-reads yes

# * === Slow Log * === #
slowlog-log-slower-than 15000
slowlog-max-len 256

